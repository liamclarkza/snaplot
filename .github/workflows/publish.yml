name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      # Don't pass registry-url — it causes setup-node to write a default
      # auth token to .npmrc that preempts the OIDC trusted-publisher flow.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npm run build

      - run: cd packages/snaplot && npm publish --provenance --access public
