name: Publish to npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - run: npm install
      - run: npm run build

      # Copy root README + LICENSE into the package so npm renders them.
      - run: cp README.md LICENSE packages/snaplot/

      - run: cd packages/snaplot && npm publish --provenance --access public
