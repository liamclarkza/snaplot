name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install
      - run: npm run build

      # Copy root README + LICENSE into the package so npm renders them.
      - run: cp README.md LICENSE packages/snaplot/

      - run: cd packages/snaplot && npm publish --provenance --access public
